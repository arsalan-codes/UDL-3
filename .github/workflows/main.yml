name: 📥 Download File (No Activation)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 Download links (space-separated)'
        required: true
        type: string
      mode:
        description: '📦 Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: '🔒 Zip password (optional)'
        required: false
        default: ''
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Check URL provided
        run: |
          if [ -z "${{ github.event.inputs.urls }}" ]; then
            echo "❌ No download links provided!"
            exit 1
          fi
          echo "✅ Download links received"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for large files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y aria2 zip curl bc

      - name: Download files
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"

          SPLIT_THRESHOLD_MB=95
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          BACKUP_DIR="/tmp/download_backup_$$"
          mkdir -p "$BACKUP_DIR"
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt

          mkdir -p downloads tmp_downloads

          RANDOM_WORDS=(alpha beta gamma delta epsilon zeta theta kappa lambda sigma omega nova star moon sun sky cloud river ocean mountain)

          get_random_word() {
            echo "${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}_$RANDOM"
          }

          get_unique_folder() {
            local BASE_PATH="$1" NAME="$2"
            if [ ! -d "$BASE_PATH/$NAME" ] && [ ! -d "$BACKUP_DIR/$NAME" ]; then
              echo "$NAME"
              return
            fi
            local SUFFIX=$(get_random_word)
            while [ -d "$BASE_PATH/${NAME}_${SUFFIX}" ] || [ -d "$BACKUP_DIR/${NAME}_${SUFFIX}" ]; do
              SUFFIX=$(get_random_word)
            done
            echo "${NAME}_${SUFFIX}"
          }

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          create_error_file() {
            local FILENAME="$1" ERROR_MSG="$2" URL="$3"
            local BASENAME_NO_EXT="${FILENAME%.*}"
            local FOLDER_NAME=$(get_unique_folder "$BACKUP_DIR" "$BASENAME_NO_EXT")
            mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
            {
              echo "# ${FILENAME} - Download Failed"
              echo ""
              echo "---"
              echo ""
              echo "## Download Information"
              echo ""
              echo "| Property | Value |"
              echo "|----------|-------|"
              echo "| **File** | \`${FILENAME}\` |"
              echo "| **URL** | ${URL} |"
              echo "| **Date** | $(date '+%Y-%m-%d %H:%M:%S UTC') |"
              echo "| **Status** | **FAILED** |"
              echo ""
              echo "---"
              echo ""
              echo "## Error Details"
              echo ""
              echo "\`\`\`"
              echo "$ERROR_MSG"
              echo "\`\`\`"
              echo ""
              echo "---"
              echo ""
              echo "## Possible Solutions"
              echo ""
              echo "- Check if the URL is correct and accessible"
              echo "- The file may have been removed or moved"
              echo "- The server may require authentication"
              echo "- For SourceForge: Try using the direct download link"
              echo "- Some servers block automated downloads (403 Forbidden)"
              echo "- Try again later if it is a temporary server issue"
              echo ""
              echo "---"
              echo ""
              echo "*This tool created by [avasam.ir](https://avasam.ir)*"
            } > "$BACKUP_DIR/$FOLDER_NAME/README.md"
            echo "Error file created: $BACKUP_DIR/$FOLDER_NAME/README.md"
          }

          download_with_retry() {
            local URL="$1" FILENAME="$2" MAX_RETRIES=3 RETRY_DELAY=5 SUCCESS=false ERROR_LOG=""
            rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2"
            for ((attempt=1; attempt<=MAX_RETRIES; attempt++)); do
              echo "Attempt $attempt of $MAX_RETRIES for $FILENAME"
              ERROR_LOG=$(aria2c \
                --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=20M \
                --max-tries=3 \
                --retry-wait=5 \
                --timeout=60 \
                --connect-timeout=30 \
                --follow-torrent=false \
                --check-certificate=false \
                --allow-overwrite=true \
                --auto-file-renaming=false \
                --dir="tmp_downloads" \
                --out="$FILENAME" \
                "$URL" 2>&1)
              if [ -f "tmp_downloads/$FILENAME" ] && [ -s "tmp_downloads/$FILENAME" ]; then
                SUCCESS=true && break
              fi
              rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2"
              ERROR_LOG=$(curl -L -f -# \
                --retry 3 \
                --retry-delay 5 \
                --connect-timeout 30 \
                --max-time 3600 \
                -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                -o "tmp_downloads/$FILENAME" \
                "$URL" 2>&1)
              if [ -f "tmp_downloads/$FILENAME" ] && [ -s "tmp_downloads/$FILENAME" ]; then
                SUCCESS=true && break
              fi
              rm -f "tmp_downloads/$FILENAME"
              echo "Attempt $attempt failed. Waiting ${RETRY_DELAY}s before retry..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            done
            if [ "$SUCCESS" = true ] && [ -f "tmp_downloads/$FILENAME" ] && [ -s "tmp_downloads/$FILENAME" ]; then
              return 0
            else
              create_error_file "$FILENAME" "Download failed after $MAX_RETRIES attempts. Last error: $ERROR_LOG" "$URL"
              return 1
            fi
          }

          for URL in $URLS; do
            FILENAME=$(basename "$URL" | sed 's/%20/ /g' | sed 's/%2F/-/g' | sed 's/[?#].*//' | sed 's/[<>:"|?*]/_/g')
            echo "Downloading $URL -> $FILENAME"
            download_with_retry "$URL" "$FILENAME" || echo "Failed to download: $FILENAME"
          done

          # --- ZIP MODE ---
          if [ "$MODE" = "zip" ]; then
            if [ -n "$(ls -A tmp_downloads 2>/dev/null)" ]; then
              ARCHIVE_NAME="archive_$(date +%Y%m%d_%H%M%S)"
              FOLDER_NAME=$(get_unique_folder "$BACKUP_DIR" "$ARCHIVE_NAME")
              mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
              echo "Creating archive in folder: $BACKUP_DIR/$FOLDER_NAME"

              VALID_FILES=()
              for f in tmp_downloads/*; do
                if [ -f "$f" ] && [ -s "$f" ]; then
                  VALID_FILES+=("$f")
                else
                  echo "Skipping empty or invalid file: $f"
                fi
              done

              if [ ${#VALID_FILES[@]} -gt 0 ]; then
                ARCHIVE_PATH="$BACKUP_DIR/$FOLDER_NAME/${ARCHIVE_NAME}.zip"
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "${ZIP_PASSWORD}" -s ${SPLIT_THRESHOLD_MB}m "${ARCHIVE_PATH}" "${VALID_FILES[@]}"
                else
                  zip -j -s ${SPLIT_THRESHOLD_MB}m "${ARCHIVE_PATH}" "${VALID_FILES[@]}"
                fi

                if [ ! -s "${ARCHIVE_PATH}" ] && [ -z "$(ls "$BACKUP_DIR/$FOLDER_NAME/"*.z[0-9]* 2>/dev/null)" ]; then
                  echo "ERROR: Archive file is empty or not created!"
                  rm -f "$BACKUP_DIR/$FOLDER_NAME/${ARCHIVE_NAME}".*
                else
                  FOLDER_ENCODED=$(urlencode "${FOLDER_NAME}")
                  DOWNLOAD_LINKS_MD=""
                  LINK_NUM=0
                  TOTAL_ARCHIVE_SIZE=0
                  for part_file in $(ls "$BACKUP_DIR/$FOLDER_NAME/"*.zip "$BACKUP_DIR/$FOLDER_NAME/"*.z[0-9]* 2>/dev/null | sort); do
                    [ -f "$part_file" ] || continue
                    PART_BASENAME=$(basename "$part_file")
                    PART_ENCODED=$(urlencode "${PART_BASENAME}")
                    RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${PART_ENCODED}"
                    LINK_NUM=$((LINK_NUM + 1))
                    DOWNLOAD_LINKS_MD="${DOWNLOAD_LINKS_MD}| ${LINK_NUM} | \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |"$'\n'
                    PART_SIZE=$(stat -c%s "$part_file" 2>/dev/null || echo 0)
                    TOTAL_ARCHIVE_SIZE=$((TOTAL_ARCHIVE_SIZE + PART_SIZE))
                  done
                  ARCHIVE_SIZE_MB=$(echo "scale=2; $TOTAL_ARCHIVE_SIZE / 1024 / 1024" | bc)

                  {
                    echo "# ${ARCHIVE_NAME} Archive"
                    echo ""
                    echo "---"
                    echo ""
                    echo "## Download Information"
                    echo ""
                    echo "| Property | Value |"
                    echo "|----------|-------|"
                    echo "| **Archive Name** | \`${ARCHIVE_NAME}.zip\` |"
                    echo "| **Total Size** | ${ARCHIVE_SIZE_MB} MB (${LINK_NUM} parts) |"
                    echo "| **Status** | **Complete (100%)** |"
                    if [ -n "$ZIP_PASSWORD" ]; then
                      echo "| **Password Protected** | **YES** |"
                    else
                      echo "| **Password Protected** | **NO** |"
                    fi
                    echo ""
                    echo "---"
                    echo ""
                    echo "## Download Links"
                    echo ""
                    echo "| # | File | Link |"
                    echo "|---|------|------|"
                    printf '%s' "${DOWNLOAD_LINKS_MD}"
                    echo ""
                    echo "---"
                    echo ""
                    echo "## How to Extract"
                    echo ""
                    echo "1. **Download all parts** (\`.zip\`, \`.z01\`, \`.z02\`...)"
                    echo "2. **Open** \`${ARCHIVE_NAME}.zip\` with WinRAR, 7-Zip, Ark, or any standard zip tool"
                    echo "3. **Extract** — all parts combine automatically"
                    if [ -n "$ZIP_PASSWORD" ]; then
                      echo "4. Enter the password when prompted"
                    fi
                    echo ""
                    echo "---"
                    echo ""
                    echo "*This tool created by [avasam.ir](https://avasam.ir)*"
                  } > "$BACKUP_DIR/$FOLDER_NAME/README.md"
                fi
              else
                echo "No valid files to archive!"
              fi
            fi
            rm -rf tmp_downloads

          # --- NORMAL MODE ---
          else
            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue
              if [ ! -s "$FILE" ]; then
                echo "WARNING: Skipping empty file: $FILE"
                rm -f "$FILE"
                continue
              fi

              SIZE=$(stat -c%s "$FILE")
              if [ "$SIZE" -le 0 ]; then
                echo "WARNING: File has zero or invalid size: $FILE"
                rm -f "$FILE"
                continue
              fi

              BASENAME=$(basename "$FILE")
              BASENAME_NO_EXT="${BASENAME%.*}"
              FOLDER_NAME=$(get_unique_folder "$BACKUP_DIR" "$BASENAME_NO_EXT")
              mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
              FOLDER_ENCODED=$(urlencode "${FOLDER_NAME}")

              if [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                echo "$BASENAME is $(( SIZE / 1024 / 1024 ))MB - splitting into ${SPLIT_THRESHOLD_MB}MB parts"
                ARCHIVE_BASE="$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}"
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "${ZIP_PASSWORD}" -s ${SPLIT_THRESHOLD_MB}m "${ARCHIVE_BASE}.zip" "$FILE"
                else
                  zip -j -s ${SPLIT_THRESHOLD_MB}m "${ARCHIVE_BASE}.zip" "$FILE"
                fi

                PARTS_COUNT=$(ls "$BACKUP_DIR/${FOLDER_NAME}/"*.zip "$BACKUP_DIR/${FOLDER_NAME}/"*.z[0-9]* 2>/dev/null | wc -l)
                echo "Parts created in folder $BACKUP_DIR/$FOLDER_NAME: $PARTS_COUNT files"

                if [ "$PARTS_COUNT" -eq 0 ]; then
                  echo "ERROR: No archive parts were created for $BASENAME"
                  continue
                fi

                TOTAL_SIZE=0
                for part_file in "$BACKUP_DIR/${FOLDER_NAME}"/*; do
                  [ -f "$part_file" ] || continue
                  PART_SIZE=$(stat -c%s "$part_file" 2>/dev/null || echo 0)
                  TOTAL_SIZE=$((TOTAL_SIZE + PART_SIZE))
                done
                TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)

                DOWNLOAD_LINKS_MD=""
                LINK_NUM=0
                for part_file in $(ls "$BACKUP_DIR/${FOLDER_NAME}/"*.zip "$BACKUP_DIR/${FOLDER_NAME}/"*.z[0-9]* 2>/dev/null | sort -V); do
                  [ -f "$part_file" ] || continue
                  PART_BASENAME=$(basename "$part_file")
                  PART_ENCODED=$(urlencode "${PART_BASENAME}")
                  RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${PART_ENCODED}"
                  LINK_NUM=$((LINK_NUM + 1))
                  DOWNLOAD_LINKS_MD="${DOWNLOAD_LINKS_MD}| ${LINK_NUM} | \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |"$'\n'
                done

                {
                  printf '%s\n' "# ${BASENAME_NO_EXT}"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Information"
                  printf '%s\n' ""
                  printf '%s\n' "| Property | Value |"
                  printf '%s\n' "|----------|-------|"
                  printf '%s\n' "| **Original File** | \`${BASENAME}\` |"
                  printf '%s\n' "| **Total Size** | **${PARTS_COUNT} parts** - **${TOTAL_SIZE_MB} MB** |"
                  printf '%s\n' "| **Status** | **Complete (100%)** |"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    printf '%s\n' "| **Password Protected** | **YES** |"
                  else
                    printf '%s\n' "| **Password Protected** | **NO** |"
                  fi
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Links"
                  printf '%s\n' ""
                  printf '%s\n' "| # | File | Link |"
                  printf '%s\n' "|---|------|------|"
                  printf '%s' "${DOWNLOAD_LINKS_MD}"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## How to Extract"
                  printf '%s\n' ""
                  printf '%s\n' "1. **Download all parts** (\`.zip\`, \`.z01\`, \`.z02\`...)"
                  printf '%s\n' "2. **Open** \`${FOLDER_NAME}.zip\` with WinRAR, 7-Zip, Ark, or any standard zip tool"
                  printf '%s\n' "3. **Extract** — all parts combine automatically"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    printf '%s\n' "4. Enter the password when prompted"
                  fi
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
                } > "$BACKUP_DIR/$FOLDER_NAME/README.md"
              else
                echo "$BASENAME - creating zip archive in folder: $BACKUP_DIR/$FOLDER_NAME"
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "${ZIP_PASSWORD}" "$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}.zip" "$FILE"
                else
                  zip -j "$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}.zip" "$FILE"
                fi

                if [ ! -s "$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}.zip" ]; then
                  echo "ERROR: Failed to create archive for $BASENAME"
                  rm -f "$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}.zip"
                  continue
                fi

                SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                FILE_ENCODED=$(urlencode "${FOLDER_NAME}.zip")
                RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${FILE_ENCODED}"

                {
                  printf '%s\n' "# ${BASENAME_NO_EXT}"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Information"
                  printf '%s\n' ""
                  printf '%s\n' "| Property | Value |"
                  printf '%s\n' "|----------|-------|"
                  printf '%s\n' "| **Original File** | \`${BASENAME}\` |"
                  printf '%s\n' "| **Size** | ${SIZE_MB} MB |"
                  printf '%s\n' "| **Status** | **Complete (100%)** |"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    printf '%s\n' "| **Password Protected** | **YES** |"
                  else
                    printf '%s\n' "| **Password Protected** | **NO** |"
                  fi
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Link"
                  printf '%s\n' ""
                  printf '%s\n' "| File | Link |"
                  printf '%s\n' "|------|------|"
                  printf '%s\n' "| \`${FOLDER_NAME}.zip\` | [Download](${RAW_LINK}) |"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## How to Extract"
                  printf '%s\n' ""
                  printf '%s\n' "1. **Open** \`${FOLDER_NAME}.zip\` with WinRAR, 7-Zip, Ark, or any standard zip tool"
                  printf '%s\n' "2. **Extract** the file"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    printf '%s\n' "3. Enter the password when prompted"
                  fi
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
                } > "$BACKUP_DIR/$FOLDER_NAME/README.md"
              fi
            done
            rm -rf tmp_downloads
          fi

          echo "===== Backup folder contents ====="
          find "$BACKUP_DIR" -type f | head -50

      - name: Update README files
        run: |
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}/tree/$BRANCH/downloads"

          mkdir -p downloads
          cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true

          FOLDERS=$(find downloads -mindepth 1 -maxdepth 1 -type d -printf '%f\n' 2>/dev/null | sort)
          if [ -z "$FOLDERS" ]; then exit 0; fi

          urlencode() { python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"; }

          # --- downloads/README.md ---
          {
            echo "# Downloaded list :"
            echo ""
            for FOLDER in $FOLDERS; do
              FOLDER_ENCODED=$(urlencode "$FOLDER")
              echo "- [${FOLDER}](./${FOLDER_ENCODED})"
            done
            echo ""
            echo "---"
            echo ""
            echo "*This tool created by [avasam.ir](https://avasam.ir)*"
          } > downloads/README.md

          # --- Main README.md ---
          SECTION="فایل های دانلود شده :"
          if [ ! -f README.md ]; then
            echo "# Downloads" > README.md
            echo "" >> README.md
            echo "https://avasam.ir" >> README.md
          fi

          if grep -q "$SECTION" README.md; then
            sed -i "/$SECTION/,/^---$/d" README.md
          fi

          {
            echo ""
            echo "---"
            echo ""
            echo "## $SECTION"
            echo ""
            COUNTER=1
            for FOLDER in $FOLDERS; do
              FOLDER_ENCODED=$(urlencode "$FOLDER")
              echo "${COUNTER}. [$FOLDER]($REPO_URL/$FOLDER_ENCODED)"
              echo ""
              COUNTER=$((COUNTER + 1))
            done
            echo "---"
          } >> README.md

      - name: Push to repository
        run: |
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          BRANCH="${GITHUB_REF_NAME}"

          git fetch origin "$BRANCH" --quiet 2>/dev/null || true
          git reset --hard origin/"$BRANCH" 2>/dev/null || true

          mkdir -p downloads
          cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true

          git add -f downloads/ README.md
          if ! git diff --cached --quiet; then
            git commit -m "📥 Downloaded files [skip ci]"
            for i in {1..10}; do
              timeout 300 git push origin HEAD:"$BRANCH" && break
              echo "Push retry $i..."
              sleep $((3 + RANDOM % 7))
              git fetch origin "$BRANCH" --quiet
              git reset --hard origin/"$BRANCH"
              cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
              git add -f downloads/ README.md
              git commit -m "📥 Downloaded files [skip ci]" || true
            done
          fi
          echo "✅ All files pushed."
